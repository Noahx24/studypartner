<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F5F1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0c14" media="(prefers-color-scheme: dark)" />
    <title>StudyPartner</title>

    <!-- PWA manifest + iOS web-app metadata. iOS doesn't honour
         manifest.json at all for "Add to Home Screen", so the apple-*
         tags are required even with manifest.json present. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StudyPartner" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  </head>
  <body class="bg-app">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
