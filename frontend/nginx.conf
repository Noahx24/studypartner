server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown path serves index.html so React Router
    # owns client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset bundles can cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html itself must never be cached, or app updates won't reach users.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers — narrower CSP is set in main.py for API responses;
    # this is the SPA-shell baseline. `always` so they're emitted on error
    # responses (404/50x) too, not just 2xx/3xx.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    # Only meaningful over HTTPS; ignored on plain HTTP. Forces the
    # browser to stick to HTTPS for this origin once seen.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # SPA-shell CSP. script-src is 'self' only (Vite emits external module
    # bundles, no inline scripts). style-src needs 'unsafe-inline' for the
    # UI libraries' inline styles + Google Fonts stylesheet. connect-src
    # allows any https origin because the API base URL is deploy-specific
    # (often a different domain than the static host).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
