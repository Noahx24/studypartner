name: Backend tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/pyproject.toml

      - name: Install
        # Bind pip to the setup-python interpreter; `pip` on $PATH can
        # otherwise resolve to a different Python on hosts with several
        # installations (caused a "ModuleNotFoundError: fastapi" in CI
        # because pytest and pip were running from different Pythons).
        run: python -m pip install -e "app/.[dev,pdf,ai]"

      - name: Generate test Fernet key
        id: fernet
        run: |
          KEY=$(python -m app.src.utils.crypto generate-key)
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Test
        env:
          STUDYPARTNER_MOODLE_BASE_URL: https://lms.example
          STUDYPARTNER_SECRET: ci-test-secret-long-enough-to-pass-the-production-gate-check
          STUDYPARTNER_FERNET_KEY: ${{ steps.fernet.outputs.key }}
        # `python -m pytest` (not bare `pytest`) — guarantees the test
        # runner uses the interpreter where pip just installed deps.
        # The previous --ignore exclusions for test_ollama_backend.py
        # and test_production_fixes.py landed with audit-medium #34
        # (the fixtures and stale endpoints they hit are now correct).
        run: python -m pytest app/src/tests/ -q
