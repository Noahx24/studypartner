version: "3.9"

# Local dev: `docker compose up`. Brings up Postgres + the backend.
# Frontend is run separately with `cd frontend && npm run dev` to get
# Vite's HMR.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studypartner
      POSTGRES_PASSWORD: studypartner-dev
      POSTGRES_DB: studypartner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studypartner -d studypartner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # NOTE: the storage layer is still SQLite-only — storage.py
      # _check_database_url() *raises* on a postgres:// DATABASE_URL to
      # avoid silently writing to the wrong place. So we deliberately do
      # NOT set DATABASE_URL here; the backend uses the SQLite file under
      # the ./data volume. The postgres service below is reserved for the
      # pending migration and is otherwise unused by the app today.
      STUDYPARTNER_MOODLE_BASE_URL: https://mymodules.dtls.unisa.ac.za
      STUDYPARTNER_SECRET: dev-secret-do-not-use-in-prod-but-32+-chars-so-the-gate-passes-here
      STUDYPARTNER_FERNET_KEY: ${STUDYPARTNER_FERNET_KEY}
      STUDYPARTNER_ENV: development
      STUDYPARTNER_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
